<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guinea Pig Beans</title>
  </head>
  <body>
    <div id="app">
      <section id="game-shell" aria-label="Guinea Pig Beans game">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark"></span>
            <div>
              <h1>Guinea Pig Beans</h1>
              <p id="status-line">Muffin is considering a bean.</p>
            </div>
          </div>
          <div class="stats">
            <div><span>Beans</span><strong id="beans">0</strong></div>
            <div><span>Pigs</span><strong id="pig-count">1</strong></div>
            <div><span>Clean</span><strong id="cleanliness">100%</strong></div>
            <div><span>Streak</span><strong id="combo-value">Ready</strong></div>
            <div><span>Compost</span><strong id="compost">0</strong></div>
            <div><span>Squeaks</span><strong id="squeaks">0</strong></div>
            <div><span>Gold</span><strong id="golden-beans">0</strong></div>
            <div><span>Wisdom</span><strong id="cavy-wisdom">0</strong></div>
          </div>
        </header>

        <main class="layout">
          <div id="canvas-wrap">
            <div id="game-canvas"></div>
          </div>

          <aside class="panel" aria-label="Cage controls and shop">
            <section class="meters">
              <div class="meter-row">
                <div class="meter-label">
                  <span>Hay</span>
                  <strong id="hay-value">100%</strong>
                </div>
                <button id="refill-hay" type="button">Refill</button>
                <div class="meter"><span id="hay-meter"></span></div>
              </div>
              <div class="meter-row">
                <div class="meter-label">
                  <span>Water</span>
                  <strong id="water-value">100%</strong>
                </div>
                <button id="refill-water" type="button">Refill</button>
                <div class="meter"><span id="water-meter"></span></div>
              </div>
            </section>

            <section class="shop">
              <h2>Shop</h2>
              <button id="adopt-pig" type="button">
                <span>Adopt Pig</span>
                <strong id="adopt-cost">15 Beans</strong>
              </button>
              <button id="better-hay" type="button">
                <span>Better Hay</span>
                <strong id="feed-cost">25 Beans</strong>
              </button>
              <button id="better-scoop" type="button">
                <span>Better Scoop</span>
                <strong id="scoop-cost">20 Beans</strong>
              </button>
              <button id="poop-roomba" type="button">
                <span>Poop Roomba</span>
                <strong id="robot-cost">75 Beans</strong>
              </button>
              <button id="bigger-cage" type="button">
                <span>Bigger Cage</span>
                <strong id="cage-cost">80 Beans</strong>
              </button>
              <button id="rare-pig" type="button">
                <span>Legendary Pig</span>
                <strong id="rare-pig-cost">220 + Gold</strong>
              </button>
            </section>

            <section class="shop compact-shop">
              <h2>Furniture</h2>
              <button id="hidey-house" type="button"><span>Hidey House</span><strong id="hidey-house-cost"></strong></button>
              <button id="tunnel" type="button"><span>Tunnel</span><strong id="tunnel-cost"></strong></button>
              <button id="litter-tray" type="button"><span>Litter Tray</span><strong id="litter-tray-cost"></strong></button>
              <button id="chew-toy" type="button"><span>Chew Toy</span><strong id="chew-toy-cost"></strong></button>
              <button id="snuggle-sack" type="button"><span>Snuggle Sack</span><strong id="snuggle-sack-cost"></strong></button>
              <button id="cardboard-castle" type="button"><span>Cardboard Castle</span><strong id="cardboard-castle-cost"></strong></button>
              <button id="royal-throne" type="button"><span>Royal Throne</span><strong id="royal-throne-cost"></strong></button>
            </section>

            <section class="shop compact-shop">
              <h2>Abilities</h2>
              <button id="wheek-call" type="button"><span>Wheek Call</span><strong id="wheek-call-status"></strong></button>
              <button id="treat-bag" type="button"><span>Treat Bag</span><strong id="treat-bag-status"></strong></button>
              <button id="deep-clean" type="button"><span>Deep Clean</span><strong id="deep-clean-status"></strong></button>
              <button id="fresh-bedding" type="button"><span>Fresh Bedding</span><strong id="fresh-bedding-status"></strong></button>
              <button id="snack-time" type="button"><span>Snack Time</span><strong id="snack-time-status"></strong></button>
              <button id="zoomie-mode" type="button"><span>Zoomie Mode</span><strong id="zoomie-mode-status"></strong></button>
            </section>

            <section class="shop compact-shop">
              <h2>Mythos</h2>
              <button id="hay-dimension" type="button"><span>Hay Dimension</span><strong id="hay-dimension-status"></strong></button>
              <button id="bean-exchange" type="button"><span>Bean Exchange</span><strong id="bean-exchange-status"></strong></button>
              <button id="cavy-council" type="button"><span>Cavy Council</span><strong id="cavy-council-status"></strong></button>
              <button id="squeak-choir" type="button"><span>Squeak Choir</span><strong id="squeak-choir-status"></strong></button>
              <button id="bean-singularity" type="button"><span>Bean Singularity</span><strong id="bean-singularity-status"></strong></button>
              <button id="prestige" type="button"><span>Great Composting</span><strong id="prestige-cost"></strong></button>
            </section>

            <section class="pig-roster">
              <h2>Herd</h2>
              <ul id="pig-roster"></ul>
            </section>

            <section class="goals">
              <h2>Goals</h2>
              <ul id="quest-list"></ul>
              <h2>Achievements</h2>
              <ul id="achievement-list"></ul>
            </section>

            <section class="log">
              <h2>Cage Log</h2>
              <ol id="event-log"></ol>
            </section>
          </aside>
        </main>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
